spring.application.name=cinemabox-backend

spring.datasource.url=jdbc:postgresql://localhost:5432/cinemabox
spring.datasource.username=cinemabox_user
spring.datasource.password=cinemabox_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

jwt.secret=mySuperSecretKeyForCinemaBoxApp2025
jwt.expiration=86400000

server.port=8080